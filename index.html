<!DOCTYPE html>
<html lang="fr">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a12;
            color: #e4e5ea;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        a { color: #6c5ce7; text-decoration: none; }
        a:hover { color: #7c6df7; }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(108,108,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,108,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .page {
            position: relative;
            z-index: 2;
            max-width: 440px;
            margin: 0 auto;
            padding: 0 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Avatar */
        .avatar {
            display: block;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1.2rem;
            border: 2px solid #1e2233;
        }

        /* Logo */
        .logo {
            text-align: center;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #6c6cff 0%, #5cc8ff 50%, #4aff6a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 3rem;
        }

        /* Projects */
        .section {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #333;
            margin-bottom: 0.7rem;
        }

        .tools {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 3rem;
        }

        .tool {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.7rem 0.9rem;
            background: #12141e;
            border: 1px solid #1e2233;
            border-radius: 8px;
            transition: border-color 0.15s;
            color: #e4e5ea;
        }
        .tool:hover { border-color: #6c5ce7; }

        .tool-icon {
            width: 30px; height: 30px;
            background: rgba(108, 92, 231, 0.1);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .tool-icon svg { color: #6c5ce7; }

        .tool-info { flex: 1; min-width: 0; }
        .tool-name { font-weight: 600; font-size: 0.85rem; }
        .tool-desc { font-size: 0.7rem; color: #555; margin-top: 0.1rem; }

        .tool-arrow { color: #333; flex-shrink: 0; }
        .tool:hover .tool-arrow { color: #6c5ce7; }

        /* Contact footer */
        .contact {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            padding-bottom: 2rem;
        }
        .row {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.8rem;
            color: #444;
        }
        .row svg { color: #333; flex-shrink: 0; }
        .row a { color: #555; }
        .row a:hover { color: #e4e5ea; }
        .pgp {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.6rem;
            color: #333;
            padding: 0.1em 0.4em;
            background: #111320;
            border: 1px solid #1a1d27;
            border-radius: 3px;
        }
        .pgp:hover { border-color: #6c5ce7; color: #555; }
    </style>
</head>
<body>

</body>
</html>
