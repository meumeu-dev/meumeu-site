<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meumeu.dev</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .logo {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #6c6cff 0%, #5cc8ff 50%, #4aff6a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite alternate;
        }
        .tagline {
            margin-top: 16px;
            font-size: 1.1rem;
            color: #555;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4aff6a;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes glow {
            from { filter: brightness(1); }
            to { filter: brightness(1.3); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(108,108,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,108,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="container">
        <div class="logo">meumeu.dev</div>
        <div class="tagline">Bientot disponible <span class="dot"></span></div>
    </div>
</body>
</html>
